version: '3.8'

services:
  pg-master:
    image: postgres:14
    container_name: pg-master
    environment:
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: labdb
    ports:
      - "5432:5432"
    volumes:
      - master_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=3"]

  pg-replica1:
    image: postgres:14
    container_name: pg-replica1
    environment:
      POSTGRES_PASSWORD: adminpass
    depends_on:
      - pg-master
    ports:
      - "5435:5432"  # Usamos 5435 por el conflicto que tenías con unl_postgres_db
    volumes:
      - replica1_data:/var/lib/postgresql/data

  pg-replica2:
    image: postgres:14
    container_name: pg-replica2
    environment:
      POSTGRES_PASSWORD: adminpass
    depends_on:
      - pg-master
    ports:
      - "5434:5432"
    volumes:
      - replica2_data:/var/lib/postgresql/data

  api-rest:
    image: postgrest/postgrest
    container_name: postgrest-api
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:adminpass@pg-master:5432/labdb
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
    depends_on:
      - pg-master

volumes:
  master_data:
  replica1_data:
  replica2_data:
